name: check python quality 
on:
  pull_request
jobs:
  lint_python:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code                                                                                                  
        uses: actions/checkout@v4 
      - name: install flake8
        run: python -m pip install flake8
      - name: check python code
        run: flake8 ./
      