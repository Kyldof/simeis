name: verifier les TODO

on: [push, pull_request]

permissions:
  contents: read
  issues: read

jobs:
  check_todos:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: verifier que chaque TODO est lié à une issue ouverte
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GH_REPO: ${{github.repository}}
        run: |
          Ligne_TODOs=$(grep -rohE 'TODO \(#[0-9]+\).*')
          ISSUES=$(gh issue list --state open --limit 1000 --json number --jq '.[].number')
          FAIL=0
          while read -r todo; do
            num=$(echo "$todo" | grep -oE '#[0-9]+' | tr -d '#')
            found=0
            while read -r issue; do
              if [ "$num" = "$issue" ]; then
                found=1
              fi
            done <<< "$ISSUES"
            if [ "$found" -eq 0 ]; then
              echo "::error::TODO #$num : pas d'issue ouverte correspondante ($todo)"
              FAIL=1
            fi
          done <<< "$Ligne_TODOs"
          exit $FAIL
