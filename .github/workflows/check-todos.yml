name: verifier les TODO

on: [push, pull_request]

permissions:
  contents: read
  issues: read

jobs:
  check_todos:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: verifier que chaque TODO est lié à une issue ouverte
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GH_REPO: ${{github.repository}}
        run: |
          Ligne_TODOs=$(grep -rohE 'TODO \(#[0-9]+\).*')
          echo "$Ligne_TODOs"
          ISSUES=$(gh issue list --state open --limit 1000 --json number --jq '.[].number')
          echo "$ISSUES"
