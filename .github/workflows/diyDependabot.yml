name: diyDependabot

# TODO: remettre le schedule apres les tests - cron: "0 10 * * 1" (tous les lundis à 10h UTC)
on:
  push:
  workflow_dispatch:

jobs:
  # Met à jour les dépendances Rust et crée une PR si y'a des changements
  Mise-a-jour-des-dependances:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo update
        id: cargo-update
        run: |
          cargo update 2>&1 | tee cargo-update.log
          # cargo update --dry-run affiche "Updating ..." si des changements existent
          # On detecte si Cargo.lock a ete modifie apres cargo update
          if git diff --quiet Cargo.lock; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.cargo-update.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "update cargo dependencies"
          title: "update cargo dependencies"
          body: "Ceci est une Pull Request automatique Pour update les dépendances du projet"
          branch: "diy-dependabot/update-deps"
          base: main
          labels: "bot/update"
