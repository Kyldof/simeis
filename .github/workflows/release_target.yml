name: check release target
on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write

jobs:
  check-release-source:
    runs-on: ubuntu-latest
    steps:
      - name: release/* PR -> main or bug/*
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$BASE_REF" == release/* ]]; then
            if [[ "$HEAD_REF" != "main" && "$HEAD_REF" != bug/* ]]; then
              echo "::error::Une PR vers '$BASE_REF' doit provenir de 'main' ou 'bug/*' (source : $HEAD_REF)"
              exit 1
            fi
          fi
      - name: close on failure
        if: failure()
        uses: superbrothers/close-pull-request@v3
        with:
          comment: "Une PR vers une branche release/* doit provenir de 'main' ou 'bug/*'. PR fermée."
