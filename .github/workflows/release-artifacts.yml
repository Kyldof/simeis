name: release-artifacts

permissions:
  contents: write

on:
  push:
    branches:
      - master

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: Acquire code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          sudo apt update && sudo apt install rustup

      - name: Put commit hash/name in env variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build project
        run: cargo build --release

      - name: Release the new binaries
        uses: mini-bomba/create-github-release@v1.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
          prerelease: true
          name: "Latest Commit That Compiles"
          body: |
            Built from commit ${{ env.GIT_HASH }}
            Triggered by @${{ github.actor }}

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Commit message:
            ${{ env.GIT_MESSAGE }}
          files: |
            target/release/simeis-data.exe
          clear_attachments: true
