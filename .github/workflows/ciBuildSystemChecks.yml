name: CI - Checks & Tests

# Se declenche sur toutes les PR qui ciblent main (et les autres branches si besoin)
on:
  pull_request:
    branches:
      - main

jobs:
  verification-et-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Run check & clippy
        run: make check

      - name: Run tests
        run: make test
