name: advanced analyse
on:
  push:
    branches:
      - "release/**"
jobs:
  audit-secu:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: install cargot audit
        run: cargo install cargo-audit
      - name: cargot audit
        run: cargot-audit
  audit-dep:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: install cargot udeps
        run: cargo install cargo-udeps
      - name: cargo-udeps
        run: cargo-udeps
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: cargo test (heavy-testing)
        run: cargo test --workspace --features heavy-testing
  verify-heavy-testing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: heavy testing
        run: cargo build --workspace --features heavy-testing
      - name: script python for tests
        run: python tests/functional.py
