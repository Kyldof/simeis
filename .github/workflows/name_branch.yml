name: check PR name
on: 
    pull_request_target:
        types: [opened]
jobs:
  check-base:
    runs-on: ubuntu-latest
    steps:
      - name: features branches must target main
        run: |
          if [[ ( "${{ github.head_ref }}" == feature* || "${{ github.head_ref }}" == bug/* ) \
            && "${{ github.base_ref }}" != "main" ]]; then
            echo "::error::la branche cible dois être 'main' pour ce type de PR"
            exit 1
          fi
      - name: close on failure
        if: failure()
        uses: superbrothers/close-pull-request@v3
        with:
            comment: "pas la bonne branche cible"